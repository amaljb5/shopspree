<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #fef2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .error-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border-top: 6px solid #dc2626;
        }
        .icon-error {
            background-color: #fee2e2;
            color: #dc2626;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        h1 {
            color: #1f2937;
            margin: 0 0 10px;
            font-size: 24px;
        }
        p {
            color: #4b5563;
            margin: 0 0 30px;
            line-height: 1.5;
        }
        .btn-retry {
            display: inline-block;
            background-color: #dc2626;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-retry:hover {
            background-color: #b91c1c;
        }
        .btn-home {
            display: inline-block;
            background-color: #f3f4f6;
            color: #374151;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-home:hover {
            background-color: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-error">!</div>
        <h1>Payment Failed</h1>
        <p>Unfortunately, your mock transaction could not be processed. This typically happens for demonstration purposes (e.g. entering a card ending in 0000).</p>
        
        <p><strong>Order ID:</strong> {{ transaction.order_id }}</p>
        
        <a href="{{ url_for('payment_terminal', order_id=transaction.order_id) }}" class="btn-retry">Try Again</a>
        <a href="{{ url_for('home') }}" class="btn-home">Return to Store</a>
    </div>
</body>
</html>
